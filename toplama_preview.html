document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 Condensed';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"87ba9175-b879-4991-8c33-a5f06fe766ed\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Barlow Semi Condensed';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"fd86fdd9-ac30-4253-b371-ef53732b3df2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Barlow Semi Condensed';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2c65ba14-fbf9-49f9-af45-c6e7209c305c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Cinzel';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"e4abf081-4250-459d-93d6-43e7dcc75916\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Cinzel';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1e2eddd0-0283-41fb-aa66-836a1d28795c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Cinzel';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e4abf081-4250-459d-93d6-43e7dcc75916\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Cinzel';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1e2eddd0-0283-41fb-aa66-836a1d28795c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{ --ink:#ece4d4; --muted:#9a9082; --faint:#6a6256; }\n*{box-sizing:border-box;}\nhtml,body{margin:0;}\nbody{\n  background:#33373b;\n  color:var(--ink); font-family:'Barlow Semi Condensed',system-ui,sans-serif;-webkit-font-smoothing:antialiased;\n  padding:42px 0 70px;\n}\n.wrap{max-width:1180px;margin:0 auto;padding:0 36px;}\n.masthead{margin-bottom:30px;}\n.eyebrow{font-family:'Barlow Condensed';font-weight:700;letter-spacing:.3em;text-transform:uppercase;font-size:12px;color:#c8bfa8;margin:0 0 8px;}\n.masthead h1{font-family:'Cinzel',serif;font-weight:700;font-size:34px;margin:0;color:#f3ecd9;}\n.masthead p{color:var(--muted);font-size:14.5px;margin:10px 0 0;max-width:640px;line-height:1.5;}\n\n/* tier headers */\n.thead{display:grid;grid-template-columns:96px repeat(3,1fr);gap:26px;margin:8px 0 14px;}\n.thead .t{text-align:center;font-family:'Cinzel',serif;font-weight:700;font-size:22px;color:#e7dcc4;}\n\n/* resource row */\n.rrow{display:grid;grid-template-columns:96px repeat(3,1fr);gap:26px;align-items:center;\n  padding:14px 0;border-top:1px solid rgba(255,255,255,.05);}\n.rrow:last-child{border-bottom:1px solid rgba(255,255,255,.05);}\n.rname{font-family:'Cinzel',serif;font-weight:600;font-size:21px;color:#f0e8d6;}\n.tgroup{display:flex;gap:11px;justify-content:center;}\n\n/* ---- gathering node card ---- */\n.gnode{display:flex;flex-direction:column;align-items:center;}\n.gframe{\n  position:relative;width:62px;height:84px;border-radius:14px;overflow:hidden;\n  border:3px solid #100d0b;background:var(--zg);\n  box-shadow:0 5px 11px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12), inset 0 -10px 16px rgba(0,0,0,.35);\n}\n.gframe::before{content:\"\";position:absolute;inset:0;border-radius:11px;pointer-events:none;\n  box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.55);}\n.gframe svg, .gframe img{position:absolute;top:5px;left:50%;transform:translateX(-50%);width:54px;height:60px;object-fit:contain;\n  filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));}\n.gnum{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-weight:700;\n  color:#fff;font-size:14px;letter-spacing:.04em;text-shadow:0 1px 3px rgba(0,0,0,.85);}\n.gtimer{margin-top:5px;font-family:'Barlow Condensed';font-weight:600;font-size:9.5px;letter-spacing:.04em;\n  color:#e9e1d2;background:var(--zt);padding:1px 8px;border-radius:6px;box-shadow:0 2px 4px rgba(0,0,0,.4);}\n\n/* 4 zone palettes */\n.z0{--zg:linear-gradient(180deg,#7c6c66,#4a3f3a);--zt:#5a4c46;}\n.z1{--zg:linear-gradient(180deg,#3a7e26,#193c11);--zt:#235016;}\n.z2{--zg:linear-gradient(180deg,#3b37ab,#1a1850);--zt:#231f60;}\n.z3{--zg:linear-gradient(180deg,#9c2c27,#481210);--zt:#5e1814;}\n\n.foot{margin-top:36px;color:var(--faint);font-size:12px;font-family:'Barlow Condensed';letter-spacing:.12em;text-transform:uppercase;}\n@media(max-width:900px){ .tgroup{gap:7px;} .gframe{width:54px;height:74px;} .gframe svg{width:44px;height:44px;} }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n  <header class=\"masthead\">\n    <p class=\"eyebrow\">Harita · Toplama Alanları<\u002Fp>\n    <h1>Toplama Düğümleri<\u002Fh1>\n    <p>6 kaynak × 3 kademe × 4 bölge rengi (nötr · yeşil · mavi · kırmızı). İkon kademeyle değişir, çerçeve rengi bölgeyi gösterir, alttaki sayaç yenilenme süresidir.<\u002Fp>\n  <\u002Fheader>\n\n  <div class=\"thead\"><div><\u002Fdiv><div class=\"t\">Tier 1<\u002Fdiv><div class=\"t\">Tier 2<\u002Fdiv><div class=\"t\">Tier 3<\u002Fdiv><\u002Fdiv>\n  <div id=\"board\"><\u002Fdiv>\n\n  <p class=\"foot\">Özgün tasarım · stilize kaynak ikonları<\u002Fp>\n<\u002Fdiv>\n\n<script>\nconst RES = [\n  {k:'wood', name:'Wood'},\n  {k:'fish', name:'Fish'},\n  {k:'hide', name:'Hide'},\n  {k:'stone',name:'Stone'},\n  {k:'herb', name:'Herb'},\n  {k:'ore',  name:'Ore'}\n];\nconst ROMAN = {1:'I',2:'II',3:'III'};\n// real artwork — [T1,T2,T3] -> node-art/rNN.png index\nconst ART = {\n  wood:[17,0,1], fish:[2,3,4], hide:[5,6,7],\n  stone:[8,10,9], herb:[11,13,12], ore:[14,16,15]\n};\nconst src = i => 'node-art/r'+String(i).padStart(2,'0')+'.png';\n\nfunction card(res, tier, zone){\n  return `<div class=\"gnode\">\n    <div class=\"gframe z${zone}\">\n      <img alt=\"${res} ${ROMAN[tier]}\" src=\"${src(ART[res][tier-1])}\"/>\n      <span class=\"gnum\">${ROMAN[tier]}<\u002Fspan>\n    <\u002Fdiv>\n    <span class=\"gtimer\">29.59<\u002Fspan>\n  <\u002Fdiv>`;\n}\n\ndocument.getElementById('board').innerHTML = RES.map(r=>`\n  <div class=\"rrow\">\n    <div class=\"rname\">${r.name}<\u002Fdiv>\n    ${[1,2,3].map(t=>`<div class=\"tgroup\">${[0,1,2,3].map(z=>card(r.k,t,z)).join('')}<\u002Fdiv>`).join('')}\n  <\u002Fdiv>`).join('');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
